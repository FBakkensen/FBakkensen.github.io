---
layout: page
title: Tags
permalink: /tags/
---

<div class="tags-page">
  <div class="pp-breadcrumb" style="max-width: none; margin: 0 0 24px;">
    <span class="tp-cmd-path">PS C:\ALProjects\BCBlog&gt;</span>
    <span class="tp-cmd-verb">Get-Tags</span>
    <span class="tp-cmd-pipe">|</span>
    <span class="tp-cmd-verb">Group-Object</span>
    <span class="tp-cmd-flag">-Property</span>
    <span class="tp-cmd-string">Name</span>
    <span class="tp-cmd-pipe">|</span>
    <span class="tp-cmd-verb">Sort-Object</span>
    <span class="tp-cmd-flag">Count</span>
    <span class="tp-cmd-flag">-Descending</span>
  </div>

  <div id="tag-cloud" class="tag-cloud-page">
    <!-- Tags will be populated by JavaScript -->
  </div>

  <div class="pp-breadcrumb" style="max-width: none; margin: 24px 0;">
    <span class="tp-cmd-path">PS C:\ALProjects\BCBlog&gt;</span>
    <span class="tp-cmd-verb">Get-BlogPosts</span>
    <span class="tp-cmd-flag">-Tag</span>
    <span class="tp-cmd-string">"<span id="selected-tag">all</span>"</span>
  </div>

  <div id="tag-posts" class="tag-posts">
    <!-- Posts will be populated by JavaScript -->
  </div>
</div>

<script>
// Collect all posts with their tags
const posts = [
  {% for post in site.posts %}
  {
    title: {{ post.title | jsonify }},
    url: {{ post.url | jsonify }},
    date: {{ post.date | date: "%Y-%m-%d" | jsonify }},
    excerpt: {{ post.excerpt | strip_html | truncatewords: 50 | jsonify }},
    tags: {{ post.tags | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];

// Count tags
const tagCounts = {};
posts.forEach(post => {
  if (post.tags) {
    post.tags.forEach(tag => {
      tagCounts[tag] = (tagCounts[tag] || 0) + 1;
    });
  }
});

// Display tag cloud
const tagCloudEl = document.getElementById('tag-cloud');
Object.entries(tagCounts)
  .sort((a, b) => b[1] - a[1])
  .forEach(([tag, count]) => {
    const tagLink = document.createElement('a');
    tagLink.href = '#' + tag.toLowerCase().replace(/\s+/g, '-');
    tagLink.className = 'tag-link';
    tagLink.innerHTML = `<span class="tag-name">${tag}</span> <span class="tag-count">(${count})</span>`;
    tagLink.onclick = (e) => {
      e.preventDefault();
      showPostsForTag(tag);
    };
    tagCloudEl.appendChild(tagLink);
  });

// Show all posts initially
showAllPosts();

// Function to show posts for a specific tag
function showPostsForTag(tag) {
  document.getElementById('selected-tag').textContent = tag;
  const filteredPosts = posts.filter(post =>
    post.tags && post.tags.includes(tag)
  );
  displayPosts(filteredPosts);

  // Update active tag
  document.querySelectorAll('.tag-link').forEach(link => {
    link.classList.remove('active');
    if (link.textContent.includes(tag)) {
      link.classList.add('active');
    }
  });
}

// Function to show all posts
function showAllPosts() {
  document.getElementById('selected-tag').textContent = 'all';
  displayPosts(posts);
}

// Function to display posts
function displayPosts(postsToShow) {
  const container = document.getElementById('tag-posts');
  container.innerHTML = '';

  postsToShow.forEach(post => {
    const postEl = document.createElement('article');
    postEl.className = 'post-preview';
    postEl.innerHTML = `
      <div class="post-header">
        <time class="post-date">${post.date}</time>
        <h2 class="post-title">
          <a href="${post.url}">${post.title}</a>
        </h2>
      </div>
      <div class="post-excerpt">
        ${post.excerpt}
      </div>
      <a href="${post.url}" class="read-more">
        <span class="prompt">PS&gt;</span> Read-Post -FullContent →
      </a>
    `;
    container.appendChild(postEl);
  });
}

// Handle hash changes
window.addEventListener('hashchange', () => {
  const tag = decodeURIComponent(window.location.hash.slice(1).replace(/-/g, ' '));
  if (tag && tagCounts[tag]) {
    showPostsForTag(tag);
  } else {
    showAllPosts();
  }
});

// Check initial hash
if (window.location.hash) {
  const tag = decodeURIComponent(window.location.hash.slice(1).replace(/-/g, ' '));
  if (tag && tagCounts[tag]) {
    showPostsForTag(tag);
  }
}
</script>
