---
layout: base
---
<article class="pp-article">
  <header class="pp-header">
    <h1 class="pp-title">{{ page.title | escape }}</h1>
    {% if page.description %}
      <p class="pp-deck">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="pp-body">
    {{ content }}
  </div>
</article>
